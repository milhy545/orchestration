services:
  vault:
    image: hashicorp/vault:1.16
    container_name: mcp-vault
    profiles: ["manual-only"]
    cap_add:
      - IPC_LOCK
    entrypoint: ["vault"]
    command: server -config=/vault/config/server.hcl
    ports:
      - "${VAULT_PORT:-7070}:8200"
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
    healthcheck:
      test:
        [
          "CMD",
          "/bin/sh",
          "-lc",
          "export VAULT_ADDR=http://127.0.0.1:8200; vault status >/dev/null 2>&1; code=$$?; [ \"$$code\" -eq 0 ] || [ \"$$code\" -eq 2 ]",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-data:/vault/data
      - vault-runtime:/vault/runtime
    restart: unless-stopped
    networks:
      - mcp-network

  vault-bootstrap:
    image: hashicorp/vault:1.16
    container_name: mcp-vault-bootstrap
    entrypoint: ["/bin/sh", "/vault/config/bootstrap.sh"]
    environment:
      - VAULT_ADDR=http://vault:8200
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime
    restart: "no"
    networks:
      - mcp-network

  vault-agent-common:
    image: hashicorp/vault:1.16
    container_name: mcp-vault-agent-common
    profiles: ["manual-only"]
    entrypoint: ["/bin/sh", "/vault/config/render-envs.sh"]
    environment:
      - VAULT_ADDR=http://vault:8200
      - RENDER_INTERVAL_SECONDS=${RENDER_INTERVAL_SECONDS:-30}
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime
    restart: unless-stopped
    networks:
      - mcp-network

  vault-secrets-ui:
    build:
      context: ./services/vault-secrets-ui
      dockerfile: Dockerfile
    container_name: mcp-vault-secrets-ui
    profiles: ["manual-only"]
    ports:
      - "${VAULT_WEBUI_PORT:-10000}:10000"
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN_FILE=/vault/runtime/admin.token
      - VAULT_RUNTIME_DIR=/vault/runtime
      - WEBUI_PORT=10000
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    volumes:
      - vault-runtime:/vault/runtime
    restart: unless-stopped
    networks:
      - mcp-network

  mega-orchestrator:
    depends_on:
      - postgresql
      - redis
      - vault-agent-common
    entrypoint: ["/bin/sh", "/vault/config/run-with-env.sh", "/vault/runtime/mega-orchestrator.env"]
    command: ["python", "mega_orchestrator.py"]
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime:ro

  perplexity-hub:
    depends_on:
      - postgresql
      - redis
      - vault-agent-common
    entrypoint: ["/bin/sh", "/vault/config/run-with-env.sh", "/vault/runtime/perplexity-hub.env"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime:ro

  advanced-memory-mcp:
    depends_on:
      - postgresql
      - redis
      - qdrant-vector
      - vault-agent-common
    entrypoint: ["/bin/sh", "/vault/config/run-with-env.sh", "/vault/runtime/advanced-memory-mcp.env"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime:ro

  zen-mcp-server:
    depends_on:
      - redis
      - vault-agent-common
    entrypoint: ["/bin/sh", "/vault/config/run-with-env.sh", "/vault/runtime/zen-mcp-server.env"]
    command: ["python", "server.py"]
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime:ro

  gmail-mcp:
    depends_on:
      - vault-agent-common
    entrypoint: ["/bin/sh", "/vault/config/run-with-env.sh", "/vault/runtime/gmail-mcp.env"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime:ro

  security-mcp:
    depends_on:
      - vault-agent-common
    entrypoint: ["/bin/sh", "/vault/config/run-with-env.sh", "/vault/runtime/security-mcp.env"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime:ro

  marketplace-mcp:
    depends_on:
      - vault-agent-common
    entrypoint: ["/bin/sh", "/vault/config/run-with-env.sh", "/vault/runtime/marketplace-mcp.env"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./infra/vault:/vault/config:ro
      - vault-runtime:/vault/runtime:ro

  config-mcp:
    depends_on:
      - vault-bootstrap
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN_FILE=/vault/runtime/read.token
    volumes:
      - vault-runtime:/vault/runtime:ro

volumes:
  vault-runtime:
    driver: local
  vault-data:
    driver: local
